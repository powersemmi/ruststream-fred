site_name: ruststream-fred
site_description: The Redis broker for RustStream - Redis Streams consumer groups, an in-process test broker, and the lazy-startup broker contract.
site_url: https://powersemmi.github.io/ruststream-fred/
repo_url: https://github.com/powersemmi/ruststream-fred
repo_name: powersemmi/ruststream-fred
edit_uri: edit/main/docs/
copyright: Apache-2.0

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  # Renders :material-xxx: / :fontawesome-xxx: shortcodes (used on the home page grid) as inline
  # SVG icons. Without it those shortcodes show up as literal text.
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
      dedent_subsections: true
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  # Versioned docs are published with `mike` (see the Docs workflow and the version switcher).

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/powersemmi/ruststream-fred

nav:
  - Home: index.md
  - Guide:
      - redis.md
  - RustStream docs: https://powersemmi.github.io/ruststream/
  - API reference: https://docs.rs/ruststream-fred
