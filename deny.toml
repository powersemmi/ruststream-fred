# cargo-deny configuration: the dependency-graph half of the security gate.
# Checks RustSec advisories, license compatibility, duplicate versions, and
# registry sources. Run locally with `just deny`.

[graph]
all-features = true

[advisories]
yanked = "deny"

ignore = []

[licenses]
# Apache-2.0/MIT-compatible permissive licenses only.
allow = [
    "Apache-2.0",
    "MIT",
    # fred's TLS/crypto tree (rustls, ring): ring is (Apache-2.0 AND ISC), and the
    # dalek curve crates are BSD-3-Clause. All OSI-approved and permissive.
    "BSD-3-Clause",
    "ISC",
    # webpki-roots ships the Mozilla CA bundle under CDLA-Permissive-2.0, a
    # permissive data license covering the embedded certificate set.
    "CDLA-Permissive-2.0",
    # unicode-ident is (MIT OR Apache-2.0) AND Unicode-3.0; the Unicode license
    # only covers the embedded character tables and is permissive.
    "Unicode-3.0",
]

[bans]
# clippy::cargo's multiple_crate_versions is allowed in the workspace lints
# because the fred client tree pulls unavoidable duplicates; warn (not deny)
# so the report stays visible without blocking on a transitive client's
# dependency choices.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
